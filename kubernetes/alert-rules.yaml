apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: monitoring
data:
  alert-rules.yaml: |
    groups:
    - name: kubernetes-alerts
      interval: 30s
      rules:
      
      # ALERT 1: HIGH CPU USAGE
      - alert: HighCPUUsage
        expr: (sum(rate(container_cpu_usage_seconds_total[5m])) by (pod_name) * 100) > 80
        for: 2m
        labels:
          severity: warning
          incident_type: high_cpu
        annotations:
          summary: "Pod {{ $labels.pod_name }} has HIGH CPU usage!"
          description: "Pod {{ $labels.pod_name }} CPU is {{ $value }}%"
      
      # ALERT 2: HIGH MEMORY USAGE
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / 1000000) > 400
        for: 2m
        labels:
          severity: critical
          incident_type: high_memory
        annotations:
          summary: "Pod {{ $labels.pod_name }} has HIGH MEMORY usage!"
          description: "Pod memory usage is {{ $value }} MB"
      
      # ALERT 3: POD CRASH LOOP
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 1m
        labels:
          severity: critical
          incident_type: pod_crash
        annotations:
          summary: "Pod {{ $labels.pod }} is CRASHING!"
          description: "Pod keeps restarting - needs investigation"
      
      # ALERT 4: POD NOT READY
      - alert: PodNotReady
        expr: sum by (pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) > 0
        for: 2m
        labels:
          severity: critical
          incident_type: pod_not_ready
        annotations:
          summary: "Pod {{ $labels.pod }} is NOT READY!"
          description: "Pod has been stuck for 2+ minutes"